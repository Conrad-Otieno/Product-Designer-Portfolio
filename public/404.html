<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Conrad Otieno | Product Designer</title>
    <script>
      // GitHub Pages SPA redirect — store full URL in sessionStorage then redirect to root
      sessionStorage.redirect = location.href;
      window.location.replace(
        location.protocol + '//' + location.hostname +
        (location.port ? ':' + location.port : '') +
        '/Product-Designer-Portfolio/'
      );
    </script>
  </head>
  <body></body>
</html>
